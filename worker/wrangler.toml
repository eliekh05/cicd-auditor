name       = "pipeline-scout"
main       = "src/index.js"
compatibility_date = "2024-09-23"

# ── KV Namespace (cache only) ────────────────────────────────────────────────
# Create with: wrangler kv:namespace create CACHE
[[kv_namespaces]]
binding = "CACHE"
id      = "REPLACE_WITH_CACHE_KV_ID"

# ── Backend URL (set as secret) ──────────────────────────────────────────────
# wrangler secret put BACKEND_URL

[env.production]
name = "pipeline-scout-prod"

[env.staging]
name = "pipeline-scout-staging"
