name       = "pipeline-scout"
main       = "src/index.js"
compatibility_date = "2024-09-23"

# ── KV Namespace (cache only) ────────────────────────────────────────────────
# Create with: wrangler kv:namespace create CACHE
[[kv_namespaces]]
binding = "CACHE"
id      = "41e8855868de42569dca87faf1256c5b"

# ── Backend URL (set as secret) ──────────────────────────────────────────────
# wrangler secret put BACKEND_URL

[env.production]
name = "https://pipeline-scout-production.up.railway.app"
